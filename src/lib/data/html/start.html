<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>%TITLE%</title>
<style>
@font-face {
    font-family: 'Poppins';
    font-weight: 100;
    src: url('qrc:fonts/poppins/Poppins-Thin.ttf') format('truetype');
}
@font-face {
    font-family: 'Poppins';
    font-weight: 300;
    src: url('qrc:fonts/poppins/Poppins-Light.ttf') format('truetype');
}
@font-face {
    font-family: 'Poppins';
    font-weight: 800;
    src: url('qrc:fonts/poppins/Poppins-ExtraBold.ttf') format('truetype');
}
@font-face {
    font-family: 'Poppins';
    font-weight: 900;
    src: url('qrc:fonts/poppins/Poppins-Black.ttf') format('truetype');
}
@font-face {
    font-family: 'Space Mono';
    font-weight: 400;
    src: url('qrc:fonts/spacemono/SpaceMono-Regular.ttf') format('truetype');
}

:root {
    --surface: #141110;
    --surface-2: #1d1816;
    --accent: #ff6b35;
    --accent-2: #ff8c42;
    --accent-soft: color-mix(in srgb, #ff6b35 12%, transparent);
    --accent-soft-2: color-mix(in srgb, #ff6b35 18%, transparent);
    --accent-glow: rgba(255, 107, 53, 0.4);
    --text: #f6efe9;
    --text-2: #d2c1b4;
    --text-3: #a99283;
    --border: rgba(255,241,232,0.10);
    --border-2: rgba(255,241,232,0.18);
    --shadow-card: 0 10px 24px rgba(0,0,0,0.35);
}

[data-theme="light"] {
    --surface: #fffdfb;
    --surface-2: #f8f4ef;
    --text: #1f1a17;
    --text-2: #6a584d;
    --text-3: #8d7a6e;
    --border: rgba(31,26,23,0.08);
    --border-2: rgba(31,26,23,0.14);
    --shadow-card: 0 10px 24px rgba(0,0,0,0.12);
    --accent-soft: color-mix(in srgb, #ff6b35 10%, transparent);
    --accent-soft-2: color-mix(in srgb, #ff6b35 14%, transparent);
    --accent-glow: rgba(255, 107, 53, 0.3);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background:
        radial-gradient(900px 420px at 50% -8%, var(--accent-soft), transparent 70%),
        var(--surface);
    color: var(--text);
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    padding-top: 80px;
    padding-bottom: 48px;
}

.pm-start {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 32px;
}

.pm-private-notice {
    font-size: 13px;
    color: var(--text-3);
    background: var(--surface-2);
    border-radius: 8px;
    padding: 8px 16px;
    margin-bottom: 16px;
    text-align: center;
}

/* Hero */
.pm-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    width: 100%;
    max-width: 640px;
}

.pm-hero-mark {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: linear-gradient(135deg, #ff6b35, #ff8c42);
    display: grid;
    place-items: center;
    box-shadow: var(--shadow-card);
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 26px;
    line-height: 1;
}

.pm-hero-mark .lp {
    font-weight: 100;
}

.pm-hero-mark .lm {
    font-weight: 900;
}

h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 34px;
    letter-spacing: -0.03em;
    color: var(--text);
    text-align: center;
}

.dim {
    color: var(--text-3);
    font-weight: 400;
}

.pm-hero-sub {
    font-size: 14px;
    color: var(--text-3);
    margin-top: -8px;
    text-align: center;
}

/* Omnibox */
.pm-omni {
    width: 100%;
    height: 56px;
    padding: 0 8px 0 20px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border-2);
    box-shadow: var(--shadow-card);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 0;
    transition: border-color 0.15s, box-shadow 0.15s;
}

.pm-omni:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft), var(--shadow-card);
}

.pm-omni-icon {
    display: flex;
    align-items: center;
    flex-shrink: 0;
}

.pm-omni-icon img {
    width: 15px;
    height: 15px;
    opacity: 0.5;
    filter: invert(63%) sepia(10%) saturate(500%) hue-rotate(340deg) brightness(90%);
}

.pm-omni input {
    flex: 1;
    font-size: 15px;
    color: var(--text);
    background: none;
    border: none;
    outline: none;
    min-width: 0;
}

.pm-omni input::placeholder {
    color: var(--text-3);
}

.ask {
    height: 40px;
    padding: 0 16px;
    border-radius: 999px;
    background: linear-gradient(135deg, #ff6b35, #ff8c42);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 8px 18px -8px var(--accent-glow);
    transition: transform 0.1s;
    flex-shrink: 0;
    white-space: nowrap;
}

.ask:active {
    transform: scale(0.96);
}

.ask img {
    width: 13px;
    height: 13px;
    filter: invert(1);
}

/* Bridge error */
.pm-bridge-error {
    display: none;
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-3);
    align-items: center;
    gap: 8px;
    text-align: center;
}

.pm-bridge-error img {
    width: 14px;
    height: 14px;
    opacity: 0.6;
}

.pm-bridge-error a {
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
}

/* Favorites */
.pm-fav-wrap {
    width: 100%;
    max-width: 720px;
    margin-top: 52px;
}

.pm-sec-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 12px;
}

.pm-fav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
    gap: 14px;
}

.pm-fav-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
    padding: 16px 8px;
    border-radius: 18px;
    border: none;
    background: none;
    cursor: pointer;
    width: 100%;
    min-height: 44px;
    transition: background 0.15s, transform 0.15s;
    color: inherit;
}

.pm-fav-tile:hover,
.pm-fav-tile:focus-visible {
    background: var(--surface-2);
    transform: translateY(-2px);
    outline: none;
}

.pm-fav-ico {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    box-shadow: var(--shadow-card);
    flex-shrink: 0;
}

.pm-fav-name {
    font-size: 12px;
    color: var(--text-2);
    font-weight: 500;
    text-align: center;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.pm-fav-empty {
    text-align: center;
    padding: 32px 0;
}

.pm-fav-empty img {
    width: 24px;
    height: 24px;
    opacity: 0.4;
    margin-bottom: 12px;
}

.pm-fav-empty .efav-head {
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
}

.pm-fav-empty .efav-body {
    font-size: 13px;
    color: var(--text-3);
}

/* FSB Suggested Automations Strip */
.pm-fsb-strip {
    width: 100%;
    max-width: 720px;
    margin-top: 44px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 20px;
}

.pm-fsb-strip-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
}

.fsbmk {
    width: 24px;
    height: 24px;
    border-radius: 7px;
    background: var(--accent-soft-2);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 10px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
}

.pm-fsb-strip-head h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
}

.ai-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-3);
    border: 1px dashed var(--border-2);
    border-radius: 4px;
    padding: 2px 5px;
    margin-left: auto;
}

.pm-fsb-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

@media (max-width: 720px) {
    .pm-fsb-cards {
        grid-template-columns: 1fr;
    }
}

.pm-fsb-card {
    text-align: left;
    padding: 13px 14px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    width: 100%;
    min-height: 44px;
    transition: border-color 0.15s, transform 0.15s;
    color: inherit;
    font-family: inherit;
}

.pm-fsb-card:hover,
.pm-fsb-card:focus-visible {
    border-color: var(--accent);
    transform: translateY(-2px);
    outline: none;
}

.pm-fsb-card img.card-icon {
    width: 14px;
    height: 14px;
    filter: invert(45%) sepia(90%) saturate(700%) hue-rotate(340deg) brightness(100%);
}

.pm-fsb-card .t {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text);
    margin-top: 9px;
    line-height: 1.35;
}

.pm-fsb-card .s {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 4px;
}

/* FSB affiliation footer */
.pm-fsb-footer {
    width: 100%;
    max-width: 720px;
    margin-top: 32px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0.55;
}

.pm-fsb-footer img {
    height: 18px;
    width: auto;
    display: none;
}

[data-theme="dark"] .pm-fsb-footer .fsb-logo-dark {
    display: block;
}

[data-theme="light"] .pm-fsb-footer .fsb-logo-light {
    display: block;
}

/* When theme is dark (default) and no attribute set yet, show dark logo */
html:not([data-theme="light"]) .pm-fsb-footer .fsb-logo-dark {
    display: block;
}
</style>
</head>
<body>
<div class="pm-start">
  %PRIVATE-BROWSING%
  <div class="pm-hero">
    <div class="pm-hero-mark"><span class="lp">P</span><span class="lm">M</span></div>
    <h1>Prometheus<span class="dim">.</span></h1>
    <div class="pm-hero-sub">Search the web, or ask FSB to do it for you.</div>

    <div class="pm-omni">
      <span class="pm-omni-icon">
        <img src="qrc:icons/fa/magnifying-glass.svg" aria-hidden="true">
      </span>
      <input id="pm-input" type="text"
             placeholder='Search or enter address — try "book me a flight to Tokyo"'
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="ask" id="pm-ask-btn" title="Hand this to the FSB agent">
        <img src="qrc:icons/fa/bolt.svg" aria-hidden="true"> Ask FSB
      </button>
    </div>

    <div class="pm-bridge-error" id="pm-bridge-error" role="alert">
      <img src="qrc:icons/fa/triangle-exclamation.svg" aria-hidden="true">
      Agent bridge unavailable — reload the tab to restore.
      <a href="#" onclick="window.location.reload(); return false;">Reload</a>
    </div>
  </div>

  <div class="pm-fav-wrap">
    <div class="pm-sec-label">FAVORITES <span id="fav-count">0</span></div>
    <div class="pm-fav-grid" id="pm-fav-grid"></div>
  </div>

  <div class="pm-fsb-strip">
    <div class="pm-fsb-strip-head">
      <div class="fsbmk">FSB</div>
      <h3>Suggested automations</h3>
      <span class="ai-label">agent</span>
    </div>
    <div class="pm-fsb-cards" id="pm-fsb-cards"></div>
  </div>

  <div class="pm-fsb-footer" aria-label="Powered by FSB">
    <img class="fsb-logo-dark"  src="qrc:assets/fsb_logo_dark.png"  alt="FSB">
    <img class="fsb-logo-light" src="qrc:assets/fsb_logo_light.png" alt="FSB">
  </div>
</div>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script>
var FSB_SUGGESTIONS = [
    {
        icon: "qrc:icons/fa/inbox.svg",
        title: "Triage my inbox",
        sub: "Archive, label & draft replies",
        prompt: "Triage my inbox — archive newsletters and draft replies to anything from my team."
    },
    {
        icon: "qrc:icons/fa/cart-shopping.svg",
        title: "Reorder groceries",
        sub: "From last week's cart",
        prompt: "Reorder the groceries from my cart last week and check out."
    },
    {
        icon: "qrc:icons/fa/calendar-check.svg",
        title: "Find a meeting slot",
        sub: "Across 3 calendars",
        prompt: "Find a 45-min slot next week that works for me, Priya and Dana."
    }
];

var _bridgeTimer = null;

function showBridgeError() {
    var askBtn = document.getElementById('pm-ask-btn');
    if (askBtn) { askBtn.style.display = 'none'; }
    var errEl = document.getElementById('pm-bridge-error');
    if (errEl) { errEl.style.display = 'flex'; }
}

function renderFavorites(items) {
    var grid = document.getElementById('pm-fav-grid');
    var countEl = document.getElementById('fav-count');
    if (!grid) { return; }

    if (countEl) { countEl.textContent = items.length; }

    if (!items || items.length === 0) {
        grid.innerHTML =
            '<div class="pm-fav-empty">' +
            '<img src="qrc:icons/fa/star.svg" aria-hidden="true">' +
            '<div class="efav-head">No favorites yet</div>' +
            '<div class="efav-body">Open a page and bookmark it — it will appear here.</div>' +
            '</div>';
        return;
    }

    var html = '';
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var safeName = item.name
            ? item.name
                  .replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;')
                  .replace(/'/g, '&#39;')
            : '';
        var safeMono = item.mono
            ? item.mono
                  .replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/"/g, '&quot;')
                  .replace(/'/g, '&#39;')
            : '';
        var safeUrl  = item.url  ? item.url.replace(/"/g, '&quot;')  : '';
        var safeColor = item.color ? item.color.replace(/"/g, '') : '#ff6b35';
        html +=
            '<button class="pm-fav-tile" tabindex="0"' +
            ' data-url="' + safeUrl + '"' +
            ' title="' + safeName + '">' +
            '<div class="pm-fav-ico" style="background:' + safeColor + '">' + safeMono + '</div>' +
            '<div class="pm-fav-name">' + safeName + '</div>' +
            '</button>';
    }
    grid.innerHTML = html;

    var tiles = grid.querySelectorAll('.pm-fav-tile');
    for (var j = 0; j < tiles.length; j++) {
        (function(tile) {
            var url = tile.getAttribute('data-url');
            tile.addEventListener('click', function() {
                if (window._bridge && url) { window._bridge.navigateTo(url); }
            });
            tile.addEventListener('keydown', function(e) {
                if ((e.key === 'Enter' || e.key === ' ') && url) {
                    e.preventDefault();
                    if (window._bridge) { window._bridge.navigateTo(url); }
                }
            });
        })(tiles[j]);
    }
}

function renderSuggestions(bridge) {
    var container = document.getElementById('pm-fsb-cards');
    if (!container) { return; }

    var html = '';
    for (var i = 0; i < FSB_SUGGESTIONS.length; i++) {
        var s = FSB_SUGGESTIONS[i];
        var safeTitle = s.title.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var safeSub   = s.sub.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        html +=
            '<button class="pm-fsb-card" tabindex="0" data-idx="' + i + '">' +
            '<img class="card-icon" src="' + s.icon + '" aria-hidden="true">' +
            '<div class="t">' + safeTitle + '</div>' +
            '<div class="s">' + safeSub   + '</div>' +
            '</button>';
    }
    container.innerHTML = html;

    var cards = container.querySelectorAll('.pm-fsb-card');
    for (var j = 0; j < cards.length; j++) {
        (function(card, suggestion) {
            card.addEventListener('click', function() {
                if (bridge) { bridge.openAgentWithPrompt(suggestion.prompt); }
            });
            card.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    if (bridge) { bridge.openAgentWithPrompt(suggestion.prompt); }
                }
            });
        })(cards[j], FSB_SUGGESTIONS[j]);
    }
}

function isUrlLike(val) {
    if (/^https?:\/\//i.test(val)) { return true; }
    var dotIdx = val.lastIndexOf('.');
    if (dotIdx > 0 && val.indexOf(' ') === -1 && (val.length - dotIdx - 1) >= 2) {
        return true;
    }
    return false;
}

function initPage(bridge) {
    window._bridgeReady = true;
    window._bridge = bridge;
    if (_bridgeTimer !== null) {
        clearTimeout(_bridgeTimer);
        _bridgeTimer = null;
    }

    bridge.currentTheme(function(theme) {
        document.documentElement.setAttribute('data-theme', theme);
    });

    bridge.bookmarkFavoritesJson(function(json) {
        try {
            var items = JSON.parse(json);
            renderFavorites(items);
        } catch (e) {
            renderFavorites([]);
        }
    });

    renderSuggestions(bridge);

    var input   = document.getElementById('pm-input');
    var askBtn  = document.getElementById('pm-ask-btn');

    if (input) {
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var val = input.value.trim();
                if (val) {
                    if (isUrlLike(val)) {
                        bridge.navigateTo(val);
                    } else {
                        bridge.openAgentWithPrompt(val);
                    }
                }
            } else if (e.key === 'Escape') {
                input.value = '';
            }
        });
    }

    if (askBtn) {
        askBtn.addEventListener('click', function() {
            var val = input ? input.value.trim() : '';
            if (val) {
                bridge.openAgentWithPrompt(val);
            } else {
                if (input) { input.focus(); }
            }
        });
        askBtn.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                askBtn.click();
            }
        });
    }
}

document.addEventListener('DOMContentLoaded', function() {
    var input = document.getElementById('pm-input');
    if (input) { input.focus(); }

    _bridgeTimer = setTimeout(function() {
        if (!window._bridgeReady) { showBridgeError(); }
    }, 2000);

    if (typeof qt === 'undefined' || !qt.webChannelTransport) {
        showBridgeError();
        return;
    }

    new QWebChannel(qt.webChannelTransport, function(channel) {
        var bridge = channel.objects.qz_prometheus_start;
        if (!bridge) {
            showBridgeError();
            return;
        }
        initPage(bridge);
    });
});
</script>
</body>
</html>
