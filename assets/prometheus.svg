<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Prometheus icon</title>
  <desc id="desc">Prometheus PM app icon from the brand sheet.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6b35"/>
      <stop offset="1" stop-color="#ff8c42"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="61" fill="#141110"/>
  <circle cx="128" cy="128" r="88" fill="url(#accent)" opacity="0.12"/>
  <g filter="url(#softShadow)">
    <text x="128" y="122" text-anchor="middle" dominant-baseline="middle" fill="#f6efe9" font-family="Poppins, Inter, Avenir Next, Arial, sans-serif" font-size="84" letter-spacing="-6">
      <tspan font-weight="100">P</tspan><tspan font-weight="900">M</tspan>
    </text>
    <text x="128" y="172" text-anchor="middle" fill="#d2c1b4" font-family="Space Mono, SFMono-Regular, Menlo, monospace" font-size="17" letter-spacing="7">▽0.1</text>
  </g>
</svg>
