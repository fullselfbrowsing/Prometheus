<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title">
  <title id="title">Prometheus icon</title>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <rect width="256" height="256" rx="61" fill="#000000"/>
    <rect x="1" y="1" width="254" height="254" rx="60" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="128" y="120" text-anchor="middle" dominant-baseline="middle" fill="#f6efe9" font-family="Poppins, Inter, 'Avenir Next', Arial, sans-serif" font-size="96" letter-spacing="-5">
      <tspan font-weight="100">P</tspan><tspan font-weight="900">M</tspan>
    </text>
    <text x="128" y="180" text-anchor="middle" fill="#f6efe9" fill-opacity="0.85" font-family="'Space Mono', SFMono-Regular, Menlo, monospace" font-size="16" letter-spacing="7">▽0.1</text>
  </g>
</svg>
